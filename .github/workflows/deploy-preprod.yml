name: Deploy to Pre-PROD

on:
  push:
    branches: [main]
    paths:
      - 'Snowflake_Scripts/**'
      - 'scripts/**'
      - 'tests/**'
      - 'environments.yml'

concurrency:
  group: deploy-preprod
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Pre-PROD
    runs-on: ubuntu-latest
    environment: preprod
    env:
      SNOWFLAKE_DEFAULT_CONNECTION_NAME: HAKKODAINC_PARTNER
      SNOWFLAKE_CONNECTIONS_HAKKODAINC_PARTNER_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_CONNECTIONS_HAKKODAINC_PARTNER_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_CONNECTIONS_HAKKODAINC_PARTNER_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
      SNOWFLAKE_CONNECTIONS_HAKKODAINC_PARTNER_WAREHOUSE: SSOM_COCO_WH
    steps:
      - uses: actions/checkout@v4

      - name: Install Snowflake CLI
        run: |
          pip install snowflake-cli-labs
          rm -f ~/.snowflake/connections.toml

      - name: Deploy SQL scripts
        run: |
          chmod +x scripts/deploy.sh
          bash scripts/deploy.sh --env=preprod

  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy
    env:
      SNOWFLAKE_DEFAULT_CONNECTION_NAME: HAKKODAINC_PARTNER
      SNOWFLAKE_CONNECTIONS_HAKKODAINC_PARTNER_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_CONNECTIONS_HAKKODAINC_PARTNER_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_CONNECTIONS_HAKKODAINC_PARTNER_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
      SNOWFLAKE_CONNECTIONS_HAKKODAINC_PARTNER_WAREHOUSE: SSOM_COCO_WH
    steps:
      - uses: actions/checkout@v4

      - name: Install Snowflake CLI
        run: |
          pip install snowflake-cli-labs
          rm -f ~/.snowflake/connections.toml

      - name: Run smoke tests
        run: |
          chmod +x scripts/run_smoke_tests.sh
          bash scripts/run_smoke_tests.sh --env=preprod

  regression-test:
    name: Regression Tests
    runs-on: ubuntu-latest
    needs: smoke-test
    env:
      SNOWFLAKE_DEFAULT_CONNECTION_NAME: HAKKODAINC_PARTNER
      SNOWFLAKE_CONNECTIONS_HAKKODAINC_PARTNER_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_CONNECTIONS_HAKKODAINC_PARTNER_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_CONNECTIONS_HAKKODAINC_PARTNER_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
      SNOWFLAKE_CONNECTIONS_HAKKODAINC_PARTNER_WAREHOUSE: SSOM_COCO_WH
    steps:
      - uses: actions/checkout@v4

      - name: Install Snowflake CLI
        run: |
          pip install snowflake-cli-labs
          rm -f ~/.snowflake/connections.toml

      - name: Run integration tests
        run: |
          snow sql -c HAKKODAINC_PARTNER \
            --database SSOM_COCO_DB_PREPROD \
            --warehouse SSOM_COCO_WH \
            -f tests/integration_test.sql

      - name: Notify deployment success
        if: success()
        run: |
          echo "::notice::Pre-PROD deployment successful. Ready for production release tag."
