name: Deploy to Pre-PROD

on:
  push:
    branches: [main]
    paths:
      - 'Snowflake_Scripts/**'
      - 'scripts/**'
      - 'tests/**'
      - 'environments.yml'

concurrency:
  group: deploy-preprod
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Pre-PROD
    runs-on: ubuntu-latest
    environment: preprod
    env:
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Snowflake CLI
        run: pip install snowflake-cli-labs

      - name: Deploy SQL scripts
        run: |
          chmod +x scripts/deploy.sh
          bash scripts/deploy.sh --env=preprod

  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy
    env:
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Snowflake CLI
        run: pip install snowflake-cli-labs

      - name: Run smoke tests
        run: |
          chmod +x scripts/run_smoke_tests.sh
          bash scripts/run_smoke_tests.sh --env=preprod

  regression-test:
    name: Regression Tests
    runs-on: ubuntu-latest
    needs: smoke-test
    env:
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Snowflake CLI
        run: pip install snowflake-cli-labs

      - name: Configure Snowflake connection
        run: |
          python3 -c "
          import os
          os.makedirs(os.path.expanduser('~/.snowflake'), mode=0o700, exist_ok=True)
          key_path = os.path.expanduser('~/.snowflake/ci_key.p8')
          fd = os.open(key_path, os.O_WRONLY | os.O_CREAT | os.O_TRUNC, 0o600)
          with os.fdopen(fd, 'w') as f:
              f.write(os.environ['SNOWFLAKE_PRIVATE_KEY'])
          path = os.path.expanduser('~/.snowflake/connections.toml')
          fd = os.open(path, os.O_WRONLY | os.O_CREAT | os.O_TRUNC, 0o600)
          with os.fdopen(fd, 'w') as f:
              f.write('[HAKKODAINC_PARTNER]\n')
              f.write('account = \"' + os.environ['SNOWFLAKE_ACCOUNT'] + '\"\n')
              f.write('user = \"' + os.environ['SNOWFLAKE_USER'] + '\"\n')
              f.write('authenticator = \"SNOWFLAKE_JWT\"\n')
              f.write('private_key_path = \"' + key_path + '\"\n')
              f.write('warehouse = \"SSOM_COCO_WH\"\n')
          "

      - name: Run integration tests
        run: |
          snow sql -c HAKKODAINC_PARTNER \
            --database SSOM_COCO_DB_PREPROD \
            --warehouse SSOM_COCO_WH \
            -f tests/integration_test.sql

      - name: Notify deployment success
        if: success()
        run: |
          echo "::notice::Pre-PROD deployment successful. Ready for production release tag."
