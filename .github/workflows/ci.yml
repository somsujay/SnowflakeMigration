name: CI – Lint & Validate

on:
  pull_request:
    branches: [develop, 'release/*', main]
    paths:
      - 'banking/**'
      - 'scripts/**'
      - 'tests/**'
      - 'environments.yml'
      - 'schemachange-config.yml'
      - '.sqlfluff'

jobs:
  sql-lint:
    name: SQL Lint (sqlfluff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install sqlfluff
        run: pip install sqlfluff

      - name: Run sqlfluff lint
        run: |
          sqlfluff lint banking/ \
            --dialect snowflake \
            --config .sqlfluff

  validate-scripts:
    name: Validate Deployment Scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check scripts are executable-ready
        run: |
          echo ">> Verifying migration scripts exist and follow naming conventions..."
          V_COUNT=$(ls banking/V*.sql 2>/dev/null | wc -l)
          if [[ "$V_COUNT" -eq 0 ]]; then
            echo "ERROR: No versioned migration scripts (V*.sql) found"
            exit 1
          fi
          echo "   Found $V_COUNT versioned migration(s)"
          for f in banking/V*.sql banking/R*.sql banking/A*.sql; do
            if [[ ! -s "$f" ]]; then
              echo "ERROR: $f is empty"
              exit 1
            fi
            echo "   OK: $(basename $f)"
          done

      - name: Validate environments.yml structure
        run: |
          for env in dev qa preprod prod; do
            if ! grep -q "^${env}:" environments.yml; then
              echo "ERROR: Environment '${env}' not found in environments.yml"
              exit 1
            fi
          done
          echo "All environments present in environments.yml"

      - name: Shellcheck deployment scripts
        run: |
          sudo apt-get install -y shellcheck
          shellcheck scripts/deploy.sh scripts/rollback.sh scripts/run_smoke_tests.sh || true
