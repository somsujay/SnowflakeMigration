name: Deploy to QA

on:
  push:
    branches: ['release/*']
    paths:
      - 'Snowflake_Scripts/**'
      - 'scripts/**'
      - 'tests/**'
      - 'environments.yml'

concurrency:
  group: deploy-qa
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to QA
    runs-on: ubuntu-latest
    environment: qa
    steps:
      - uses: actions/checkout@v4

      - name: Install Snowflake CLI
        run: pip install snowflake-cli-labs

      - name: Configure Snowflake connection
        env:
          SF_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SF_USER: ${{ secrets.SNOWFLAKE_USER }}
          SF_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: |
          mkdir -p ~/.snowflake && chmod 0700 ~/.snowflake
          (umask 077 && printf '[HAKKODAINC_PARTNER]\naccount = "%s"\nuser = "%s"\npassword = "%s"\nwarehouse = "SSOM_COCO_WH"\n' "$SF_ACCOUNT" "$SF_USER" "$SF_PASSWORD" > ~/.snowflake/connections.toml)

      - name: Deploy SQL scripts
        run: |
          chmod +x scripts/deploy.sh
          bash scripts/deploy.sh --env=qa

  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v4

      - name: Install Snowflake CLI
        run: pip install snowflake-cli-labs

      - name: Configure Snowflake connection
        env:
          SF_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SF_USER: ${{ secrets.SNOWFLAKE_USER }}
          SF_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: |
          mkdir -p ~/.snowflake && chmod 0700 ~/.snowflake
          (umask 077 && printf '[HAKKODAINC_PARTNER]\naccount = "%s"\nuser = "%s"\npassword = "%s"\nwarehouse = "SSOM_COCO_WH"\n' "$SF_ACCOUNT" "$SF_USER" "$SF_PASSWORD" > ~/.snowflake/connections.toml)

      - name: Run smoke tests
        run: |
          chmod +x scripts/run_smoke_tests.sh
          bash scripts/run_smoke_tests.sh --env=qa

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: smoke-test
    steps:
      - uses: actions/checkout@v4

      - name: Install Snowflake CLI
        run: pip install snowflake-cli-labs

      - name: Configure Snowflake connection
        env:
          SF_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SF_USER: ${{ secrets.SNOWFLAKE_USER }}
          SF_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: |
          mkdir -p ~/.snowflake && chmod 0700 ~/.snowflake
          (umask 077 && printf '[HAKKODAINC_PARTNER]\naccount = "%s"\nuser = "%s"\npassword = "%s"\nwarehouse = "SSOM_COCO_WH"\n' "$SF_ACCOUNT" "$SF_USER" "$SF_PASSWORD" > ~/.snowflake/connections.toml)

      - name: Run integration tests
        run: |
          snow sql -c HAKKODAINC_PARTNER \
            --database SSOM_COCO_DB_QA \
            --warehouse SSOM_COCO_WH \
            -f tests/integration_test.sql
