name: Deploy to QA

on:
  push:
    branches: ['release/*']
    paths:
      - 'Snowflake_Scripts/**'
      - 'scripts/**'
      - 'tests/**'
      - 'environments.yml'

concurrency:
  group: deploy-qa
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to QA
    runs-on: ubuntu-latest
    environment: qa
    env:
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Snowflake CLI
        run: pip install snowflake-cli-labs

      - name: Deploy SQL scripts
        run: |
          chmod +x scripts/deploy.sh
          bash scripts/deploy.sh --env=qa

  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy
    env:
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Snowflake CLI
        run: pip install snowflake-cli-labs

      - name: Run smoke tests
        run: |
          chmod +x scripts/run_smoke_tests.sh
          bash scripts/run_smoke_tests.sh --env=qa

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: smoke-test
    env:
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Snowflake CLI
        run: pip install snowflake-cli-labs

      - name: Run integration tests
        run: |
          snow sql --account "$SNOWFLAKE_ACCOUNT" --user "$SNOWFLAKE_USER" --password "$SNOWFLAKE_PASSWORD" \
            --database SSOM_COCO_DB_QA \
            --warehouse SSOM_COCO_WH \
            -f tests/integration_test.sql
