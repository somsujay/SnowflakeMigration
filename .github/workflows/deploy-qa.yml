name: Deploy to QA

on:
  push:
    branches: ['release/*']
    paths:
      - 'Snowflake_Scripts/**'
      - 'scripts/**'
      - 'tests/**'
      - 'environments.yml'

concurrency:
  group: deploy-qa
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to QA
    runs-on: ubuntu-latest
    environment: qa
    env:
      SNOWFLAKE_DEFAULT_CONNECTION_NAME: HAKKODAINC_PARTNER
      SNOWFLAKE_CONNECTIONS_HAKKODAINC_PARTNER_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_CONNECTIONS_HAKKODAINC_PARTNER_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_CONNECTIONS_HAKKODAINC_PARTNER_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
      SNOWFLAKE_CONNECTIONS_HAKKODAINC_PARTNER_WAREHOUSE: SSOM_COCO_WH
    steps:
      - uses: actions/checkout@v4

      - name: Install Snowflake CLI
        run: |
          pip install snowflake-cli-labs
          rm -f ~/.snowflake/connections.toml

      - name: Deploy SQL scripts
        run: |
          chmod +x scripts/deploy.sh
          bash scripts/deploy.sh --env=qa

  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy
    env:
      SNOWFLAKE_DEFAULT_CONNECTION_NAME: HAKKODAINC_PARTNER
      SNOWFLAKE_CONNECTIONS_HAKKODAINC_PARTNER_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_CONNECTIONS_HAKKODAINC_PARTNER_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_CONNECTIONS_HAKKODAINC_PARTNER_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
      SNOWFLAKE_CONNECTIONS_HAKKODAINC_PARTNER_WAREHOUSE: SSOM_COCO_WH
    steps:
      - uses: actions/checkout@v4

      - name: Install Snowflake CLI
        run: |
          pip install snowflake-cli-labs
          rm -f ~/.snowflake/connections.toml

      - name: Run smoke tests
        run: |
          chmod +x scripts/run_smoke_tests.sh
          bash scripts/run_smoke_tests.sh --env=qa

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: smoke-test
    env:
      SNOWFLAKE_DEFAULT_CONNECTION_NAME: HAKKODAINC_PARTNER
      SNOWFLAKE_CONNECTIONS_HAKKODAINC_PARTNER_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_CONNECTIONS_HAKKODAINC_PARTNER_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_CONNECTIONS_HAKKODAINC_PARTNER_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
      SNOWFLAKE_CONNECTIONS_HAKKODAINC_PARTNER_WAREHOUSE: SSOM_COCO_WH
    steps:
      - uses: actions/checkout@v4

      - name: Install Snowflake CLI
        run: |
          pip install snowflake-cli-labs
          rm -f ~/.snowflake/connections.toml

      - name: Run integration tests
        run: |
          snow sql -c HAKKODAINC_PARTNER \
            --database SSOM_COCO_DB_QA \
            --warehouse SSOM_COCO_WH \
            -f tests/integration_test.sql
