name: Deploy to QA

on:
  push:
    branches: ['release/*']
    paths:
      - 'banking/**'
      - 'scripts/**'
      - 'tests/**'
      - 'environments.yml'
      - 'schemachange-config.yml'

concurrency:
  group: deploy-qa
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to QA
    runs-on: ubuntu-latest
    environment: qa
    env:
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install schemachange snowflake-cli-labs

      - name: Deploy with schemachange
        run: |
          mkdir -p ~/.snowflake && chmod 700 ~/.snowflake
          echo "$SNOWFLAKE_PRIVATE_KEY" > ~/.snowflake/ci_key.p8
          chmod 600 ~/.snowflake/ci_key.p8
          chmod +x scripts/deploy_schemachange.sh
          bash scripts/deploy_schemachange.sh --env=qa

  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy
    env:
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Snowflake CLI
        run: pip install snowflake-cli-labs

      - name: Run smoke tests
        run: |
          chmod +x scripts/run_smoke_tests.sh
          bash scripts/run_smoke_tests.sh --env=qa

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: smoke-test
    env:
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Snowflake CLI
        run: pip install snowflake-cli-labs

      - name: Configure Snowflake connection
        run: |
          python3 -c "
          import os
          os.makedirs(os.path.expanduser('~/.snowflake'), mode=0o700, exist_ok=True)
          key_path = os.path.expanduser('~/.snowflake/ci_key.p8')
          fd = os.open(key_path, os.O_WRONLY | os.O_CREAT | os.O_TRUNC, 0o600)
          with os.fdopen(fd, 'w') as f:
              f.write(os.environ['SNOWFLAKE_PRIVATE_KEY'])
          path = os.path.expanduser('~/.snowflake/connections.toml')
          fd = os.open(path, os.O_WRONLY | os.O_CREAT | os.O_TRUNC, 0o600)
          with os.fdopen(fd, 'w') as f:
              f.write('[MY_TRIAL_ACCOUNT]\n')
              f.write('account = \"' + os.environ['SNOWFLAKE_ACCOUNT'] + '\"\n')
              f.write('user = \"' + os.environ['SNOWFLAKE_USER'] + '\"\n')
              f.write('authenticator = \"SNOWFLAKE_JWT\"\n')
              f.write('private_key_path = \"' + key_path + '\"\n')
              f.write('warehouse = \"COMPUTE_WH\"\n')
          "

      - name: Run integration tests
        run: |
          snow sql -c MY_TRIAL_ACCOUNT \
            --database SSOM_COCO_DB_QA \
            --warehouse COMPUTE_WH \
            -f tests/integration_test.sql
