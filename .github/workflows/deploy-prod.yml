name: Deploy to PROD

on:
  push:
    tags: ['v*']

  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - deploy
          - rollback
      rollback_version:
        description: 'Version to rollback to (tag or SHA, required for rollback)'
        required: false
        type: string

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  # --- DEPLOY JOB (tag push or manual deploy) ---
  deploy:
    name: Deploy to PROD
    runs-on: ubuntu-latest
    environment: production
    env:
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_PROD_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_PROD_USER }}
      SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PROD_PRIVATE_KEY }}
      SNOWFLAKE_WAREHOUSE: PROD_WH
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'deploy')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Snowflake CLI
        run: pip install snowflake-cli-labs

      - name: Deploy SQL scripts
        run: |
          chmod +x scripts/deploy.sh
          bash scripts/deploy.sh --env=prod

  smoke-test:
    name: PROD Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy
    env:
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_PROD_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_PROD_USER }}
      SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PROD_PRIVATE_KEY }}
      SNOWFLAKE_WAREHOUSE: PROD_WH
    steps:
      - uses: actions/checkout@v4

      - name: Install Snowflake CLI
        run: pip install snowflake-cli-labs

      - name: Run smoke tests
        run: |
          chmod +x scripts/run_smoke_tests.sh
          bash scripts/run_smoke_tests.sh --env=prod

  data-validation:
    name: PROD Data Validation
    runs-on: ubuntu-latest
    needs: smoke-test
    env:
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_PROD_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_PROD_USER }}
      SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PROD_PRIVATE_KEY }}
      SNOWFLAKE_WAREHOUSE: PROD_WH
    steps:
      - uses: actions/checkout@v4

      - name: Install Snowflake CLI
        run: pip install snowflake-cli-labs

      - name: Configure Snowflake connection
        run: |
          python3 -c "
          import os
          os.makedirs(os.path.expanduser('~/.snowflake'), mode=0o700, exist_ok=True)
          key_path = os.path.expanduser('~/.snowflake/ci_key.p8')
          fd = os.open(key_path, os.O_WRONLY | os.O_CREAT | os.O_TRUNC, 0o600)
          with os.fdopen(fd, 'w') as f:
              f.write(os.environ['SNOWFLAKE_PRIVATE_KEY'])
          path = os.path.expanduser('~/.snowflake/connections.toml')
          fd = os.open(path, os.O_WRONLY | os.O_CREAT | os.O_TRUNC, 0o600)
          with os.fdopen(fd, 'w') as f:
              f.write('[MY_TRIAL_ACCOUNT]\n')
              f.write('account = \"' + os.environ['SNOWFLAKE_ACCOUNT'] + '\"\n')
              f.write('user = \"' + os.environ['SNOWFLAKE_USER'] + '\"\n')
              f.write('authenticator = \"SNOWFLAKE_JWT\"\n')
              f.write('private_key_path = \"' + key_path + '\"\n')
              f.write('warehouse = \"' + os.environ.get('SNOWFLAKE_WAREHOUSE', 'PROD_WH') + '\"\n')
          "

      - name: Run integration tests
        run: |
          snow sql -c MY_TRIAL_ACCOUNT \
            --database SSOM_COCO_DB_PROD \
            --warehouse PROD_WH \
            -f tests/integration_test.sql

  notify:
    name: Notify Deployment
    runs-on: ubuntu-latest
    needs: data-validation
    if: always()
    steps:
      - name: Deployment result
        run: |
          if [[ "${{ needs.data-validation.result }}" == "success" ]]; then
            echo "::notice::PROD deployment successful: ${{ github.ref_name }}"
          else
            echo "::error::PROD deployment FAILED. Consider rollback."
            echo "Run: gh workflow run deploy-prod.yml -f action=rollback -f rollback_version=<previous-tag>"
            exit 1
          fi

  # --- ROLLBACK JOB (manual trigger only) ---
  rollback:
    name: Rollback PROD
    runs-on: ubuntu-latest
    environment: production
    env:
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_PROD_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_PROD_USER }}
      SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PROD_PRIVATE_KEY }}
      SNOWFLAKE_WAREHOUSE: PROD_WH
    if: >
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.action == 'rollback'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate rollback version
        run: |
          VERSION="${{ github.event.inputs.rollback_version }}"
          if [[ -z "$VERSION" ]]; then
            echo "ERROR: rollback_version is required for rollback action"
            exit 1
          fi
          if ! git rev-parse --verify "$VERSION" >/dev/null 2>&1; then
            echo "ERROR: Version '$VERSION' not found in git history"
            exit 1
          fi
          echo "Rolling back to: $VERSION"

      - name: Install Snowflake CLI
        run: pip install snowflake-cli-labs

      - name: Execute rollback
        run: |
          chmod +x scripts/rollback.sh
          bash scripts/rollback.sh \
            --env=prod \
            --version=${{ github.event.inputs.rollback_version }}
