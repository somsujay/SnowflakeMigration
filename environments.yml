# Environment configuration for Snowflake deployments
# Used by scripts/deploy.sh, scripts/rollback.sh, and CI/CD pipeline
#
# Promotion path: dev → qa → preprod → prod

dev:
  database: SSOM_COCO_DB
  warehouse: SSOM_COCO_WH
  connection: MY_TRIAL_ACCOUNT

qa:
  database: SSOM_COCO_DB_QA
  warehouse: SSOM_COCO_WH
  connection: MY_TRIAL_ACCOUNT

preprod:
  database: SSOM_COCO_DB_PREPROD
  warehouse: SSOM_COCO_WH
  connection: MY_TRIAL_ACCOUNT

prod:
  database: SSOM_COCO_DB_PROD
  warehouse: PROD_WH
  connection: MY_TRIAL_ACCOUNT
